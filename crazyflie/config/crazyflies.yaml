# named list of all robots
robots:
  cf1:
    enabled: true
    uri: radio://0/80/2M/E7E7E7EE01
    initial_position: [-0.1, 0.0, 0.0]
    type: cf21  # see robot_types
  cf3: # that's not the obstacle
    enabled: true
    uri: radio://0/80/2M/E7E7E7EE03
    initial_position: [0.0, -2.5, 0.0]
    type: cf21  # see robot_types
  cf5:
    enabled: true
    uri: radio://0/80/2M/E7E7E7EE05
    initial_position: [-0.7, -1.0, 0.0]
    type: cf21  # see robot_types
  cf6:
    enabled: true
    uri: radio://0/80/2M/E7E7E7EE06
    initial_position: [-0.7, 1.0, 0.0]
    type: cf21  # see robot_types
  cf7:
    enabled: true
    uri: radio://0/80/2M/E7E7E7EE07
    initial_position: [0.7, -1.8, 0.0]
    type: cf21  # see robot_types
  cf8:
    enabled: true
    uri: radio://0/80/2M/E7E7E7EE08
    initial_position: [0.7, 1.5, 0.0]
    type: cf21  # see robot_types

# Definition of the various robot types
robot_types:
  cf21:
    motion_capture:
      enabled: true
      # only if enabled; see motion_capture.yaml
      marker: default_single_marker
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8  # V
      voltage_critical: 3.7 # V
    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5
    #firmware_logging:
    #   enabled: true
    #   default_topics:
    #   pose:
    #     frequency: 1 # Hz
    #   custom_topics:
    #    topic_name3: 
    #      frequency: 1
    #      vars: ["acc.x", "acc.y", "acc.z"]

  cf21_mocap_deck:
    motion_capture:
      enabled: true
      # only if enabled; see motion_capture.yaml
      marker: mocap_deck
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8  # V
      voltage_critical: 3.7 # V

    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5

# global settings for all robots
all:
  # firmware logging for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_logging:
    enabled: true
    default_topics:
     # remove to disable default topic
      # pose:
      #   frequency: 10 # Hz
      status:
        frequency: 1 # Hz
      # odom:
      #   frequency: 10 # Hz
      # scan:
      #   frequency: 10 # Hz
    custom_topics:
     distate:
       frequency: 25 # Hz
       vars: ["stateEstimate.x", "stateEstimate.y", "stateEstimate.vx", "stateEstimate.vy", "stateEstimate.ax", "stateEstimate.ay"]
    #  topic_name2:
    #    frequency: 1 # Hz
    #    vars: ["stabilizer.roll", "stabilizer.pitch", "stabilizer.yaw"]
  # firmware parameters for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 2 # 1: PID, 2: mellinger
    # ring:
    #   effect: 16 # 6: double spinner, 7: solid color, 16: packetRate
    #   solidBlue: 255 # if set to solid color
    #   solidGreen: 0 # if set to solid color
    #   solidRed: 0 # if set to solid color
    #   headlightEnable: 0
    locSrv:
      extPosStdDev: 1e-3
      extQuatStdDev: 0.5e-1
    # kalman:
    #   resetEstimation: 1
  broadcasts:
    num_repeats: 15 # number of times broadcast commands are repeated
    delay_between_repeats_ms: 1 # delay in milliseconds between individual repeats
