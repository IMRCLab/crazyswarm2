# Definition of the various robot types
robot_types:
  C10X:
    motion_capture:
      enabled: true
      # only if enabled; see motion_capture.yaml
      marker: C10X
      dynamics: default
    big_quad: false
    battery:
      # voltage_warning: 3.8  # V
      # voltage_critical: 3.7 # V
      voltage_warning: 3.4  # V
      voltage_critical: 3.2 # V
    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5
    #firmware_logging:
    #   enabled: true
    #   default_topics:
    #   pose:
    #     frequency: 1 # Hz
    #   custom_topics:
    #    topic_name3: 
    #      frequency: 1
    #      vars: ["acc.x", "acc.y", "acc.z"]

  c10x_mocap_deck:
    motion_capture:
      enabled: true
      # only if enabled; see motion_capture.yaml
      marker: mocap_deck
      dynamics: default
    big_quad: false
    battery:
      voltage_warning: 3.8  # V
      voltage_critical: 3.7 # V

    # firmware_params:
    #   kalman:
    #     pNAcc_xy: 1.0 # default 0.5

# global settings for all robots
all:
  # firmware logging for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_logging:
    enabled: true
    default_topics:
     # remove to disable default topic
      pose:
        frequency: 10 # Hz
      status:
        frequency: 1 # Hz
      odom:
        frequency: 10
    #custom_topics:
    #  topic_name1:
    #    frequency: 10 # Hz
    #    vars: ["stateEstimateZ.x", "stateEstimateZ.y", "stateEstimateZ.z", "pm.vbat"]
    #  topic_name2:
    #    frequency: 1 # Hz
    #    vars: ["stabilizer.roll", "stabilizer.pitch", "stabilizer.yaw"]
  # firmware parameters for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 1 # 1: PID, 2: mellinger
    # velCtlPid:
    #   vxKp: 17.0
    #   vxKi: 14.0
    #   vxKd: 1.0
    #   vxKFF: 0.0
    #   vyKp: 17.0
    #   vyKi: 14.0
    #   vyKd: 1.0
    #   vyKFF: 0.0
    # posCtlPid:
    #   xKp: 1.0
    #   xKi: 0.05
    #   xKd: 0.1

    #   yKp: 1.0
    #   yKi: 0.05
    #   yKd: 0.1

    #   zKp: 2.0
    #   zKi: 0.70
    #   zKd: 0.1

    # --------- OLD
      # xKp: 0.8
      # xKi: 0.15
      # xKd: 0.05
      # yKp: 0.8
      # yKi: 0.15
      # yKd: 0.05
      # zKp: 2.0
      # zKi: 0.70
      # zKd: 0.1
    # -------------
    # ctrlMel:
    #   mass: 0.040 #mass for crazyflie with box
      # kp_xy: 0.1
      # kd_xy: 0.2
      # ki_xy: 0.005
    pid_attitude:
      pitch_kd: 0.0
      pitch_ki: 3.0
      pitch_kp: 6.0
      roll_kd: 0.0
      roll_ki: 3.0
      roll_kp: 6.0
      yaw_kd: 0.35
      yaw_ki: 1.0
      yaw_kp: 6.0
      

    # ring:
    #   effect: 16 # 6: double spinner, 7: solid color, 16: packetRate
    #   solidBlue: 255 # if set to solid color
    #   solidGreen: 0 # if set to solid color
    #   solidRed: 0 # if set to solid color
    #   headlightEnable: 0
    locSrv:
      extPosStdDev: 1e-3
      extQuatStdDev: 0.5e-1
    kalman:
      resetEstimation: 1
  broadcasts:
    num_repeats: 15 # number of times broadcast commands are repeated
    delay_between_repeats_ms: 1 # delay in milliseconds between individual repeats
relative: false