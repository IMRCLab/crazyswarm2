/motion_capture_tracking:
  ros__parameters:
    # one of "ou", "optitrack_closed_source", "vicon", "qualisys", "nokov", "vrpn", "motionanalysis"
    type: "vicon"
    # Specify the hostname or IP of the computer running the motion capture software
    hostname: "192.168.2.15"

    topics:
      poses:
        qos:
          mode: "sensor" # one of "none" or "sensor"
          deadline: 100.0 # Hz

    marker_configurations:
      default: # for standard Crazyflie
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [   0.0,    0.0, 0.022]  # top
          p1: [-0.042,  0.042, 0.0  ]  # back left   (M3)
          p2: [-0.042, -0.042, 0.0  ]  # back right  (M2)
          p3: [ 0.042, -0.042, 0.0  ]  # front right (M1)
      C10X:
        offset: [0.0, 0.0, 0.0]
        points:
          p0: [-0.0677304,0.0457213,-0.000254381]
          p1: [-0.0665792,-0.018327,-0.000410748]
          p2: [0.013304,-0.00238943,0.000227161]
          p3: [0.0604021,0.0137415,-0.000330258]
          p4: [0.0606035,-0.0387464,0.000768527]
      C110:
        offset: [0.0, 0.0, -0.1]
        points:
          p0: [-0.0677304,0.0457213,-0.000254381]
          p1: [-0.0665792,-0.018327,-0.000410748]
          p2: [0.013304,-0.00238943,0.000227161]
          p3: [0.0604021,0.0137415,-0.000330258]
          p4: [0.0606035,-0.0387464,0.000768527]
          p5: [-0.0630946, 0.0628662, 0.0613204]

    dynamics_configurations:
      default:
        max_velocity: [2, 2, 3] # m/s
        max_angular_velocity: [20, 20, 10] # rad/s
        max_roll: 1.4 #rad
        max_pitch: 1.4 #rad
        max_fitness_score: 0.001

    # Rigid bodies will be automatically generated by the launch file
    # rigid_bodies:a